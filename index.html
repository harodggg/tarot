// 展平所有牌
function buildAllCards() {
  const all = [...MAJOR_ARCANA];
  for (const [suitKey, suitData] of Object.entries(MINOR_CARDS)) {
    const suitInfo = SUIT_NAMES[suitKey];
    for (const card of suitData) {
      all.push({
        ...card,
        suitKey,
        suitName: suitInfo.name,
        suitSymbol: suitInfo.symbol,
        suitElement: suitInfo.element,
        suitColor: suitInfo.color,
      });
    }
  }
  return all;
}

// ===== 神秘学星空 =====
function createStars() {
  const container = document.getElementById('stars');
  const starColors = ['#fff', '#fde', '#dfe', '#ffe', '#fff8dc'];
  for (let i = 0; i < 200; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    const duration = 1.5 + Math.random() * 5;
    star.style.setProperty('--d', duration + 's');
    star.style.setProperty('--delay', Math.random() * 8 + 's');
    star.style.setProperty('--min-op', (0.05 + Math.random() * 0.15));
    star.style.setProperty('--max-op', (0.4 + Math.random() * 0.6));
    star.style.setProperty('--min-s', (0.5 + Math.random() * 0.3));
    star.style.setProperty('--max-s', (1 + Math.random() * 0.5));
    const size = 1 + Math.random() * 2.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.background = starColors[i % starColors.length];
    if (size > 2) star.style.boxShadow = '0 0 4px rgba(192,132,252,0.15)';
    container.appendChild(star);
  }
  // 流星：带拖尾，随机方向，持续产生
}

// ===== 粒子爆发 =====
function burstParticles(x, y, color, count) {
  const container = document.getElementById('particleContainer');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const dist = 60 + Math.random() * 100;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--dur', (0.6 + Math.random() * 0.4) + 's');
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = color || '#c084fc';
    p.style.width = (3 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.boxShadow = `0 0 6px ${color || '#c084fc'}`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// ===== Fisher-Yates 洗牌 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 获取卡片样式类 =====
function getCardSuitClass(card) {
  if (card.suit === 'major') return 'suit-major';
  return card.suitColor || 'suit-major';
}

// ===== 渲染牌格（带入场动画） =====
function renderSlots(count) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  grid.style.setProperty('--gap', count > 3 ? '0.8rem' : count > 1 ? '1.2rem' : '0rem');

  for (let i = 0; i < count; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot entering';
    const center = (count - 1) / 2;
    const dx = (i - center) * 8;
    slot.style.setProperty('--dx', dx + 'px');
    slot.style.animationDelay = (i * 300) + 'ms';
    slot.dataset.index = i;

    // 光晕环
    const ring = document.createElement('div');
    ring.className = 'glow-ring';
    slot.appendChild(ring);

    const back = document.createElement('div');
    back.className = 'card-face card-back';
    back.innerHTML = '<img src="card_images/back.png" class="card-img" alt="">';

    const front = document.createElement('div');
    front.className = 'card-face card-front';
    // 预置正面图片（提前加载，翻转时直接显示）
    const card = drawnCards[i];
    if (card) {
      front.innerHTML = '<img src="card_images/' + card.num + '.png" class="card-img" alt="">';
    }

    slot.appendChild(back);
    slot.appendChild(front);
    slot.addEventListener('click', () => flipCard(i));
    grid.appendChild(slot);
  }

  // 入场完成后加呼吸动画并提示
  const totalDelay = count * 300 + 1200;
  setTimeout(() => {
    document.querySelectorAll('.card-slot.entering').forEach(s => {
      s.classList.remove('entering');
      s.classList.add('idle');
    });
    // 所有未翻牌加脉冲提示
    document.querySelectorAll('.card-slot:not(.flipped)').forEach(s => s.classList.add('pulse-glow'));
  }, totalDelay);
}

// ===== 罗马数字辅助 =====
function getRomanNumeral(num) {
  if (num >= 100 && num < 200) return rankLabel(num - 100);
  if (num >= 200 && num < 300) return rankLabel(num - 200);
  if (num >= 300 && num < 400) return rankLabel(num - 300);
  if (num >= 400 && num < 500) return rankLabel(num - 400);
  const map = ['0','I','II','III','IV','V','VI','VII','VIII','IX','X',
    'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'];
  return map[num] || num;
}

function rankLabel(r) {
  if (r === 1) return 'A';
  if (r === 11) return '侍';
  if (r === 12) return '骑';
  if (r === 13) return '后';
  if (r === 14) return '王';
  return r < 10 ? r + '' : '10';
}

// ===== 真实塔罗牌图片（PNG）=====
function generateCardSVG(card, isRev, suitClass, kw) {
  const revStyle = isRev ? 'transform:rotate(180deg);' : '';
  return '<img src="card_images/' + card.num + '.png" class="card-img" alt="' + card.name + '" style="' + revStyle + '">';

function flipCard(index) {
  const slots = document.querySelectorAll('.card-slot');
  const slot = slots[index];
  if (!slot || slot.classList.contains('flipped') || slot.classList.contains('empty')) return;

  const card = drawnCards[index];
  if (!card) return;
  const isRev = drawnReversed[index];
  const suitClass = getCardSuitClass(card);
  const kw = isRev ? card.keywordR : card.keywordU;

  // 粒子爆发（提前获取位置）
  const rect = slot.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const isMajor = card.suit === 'major';
  const particleColor = isMajor ? '#c084fc' : isRev ? '#f87171' : '#818cf8';

  const front = slot.querySelector('.card-front');
  const back = slot.querySelector('.card-back');
  const frontImg = front.querySelector('img');
  if (frontImg) {
    frontImg.style.transform = 'scaleX(-1)' + (isRev ? ' rotate(180deg)' : '');
  }

  // 粒子爆发
  burstParticles(cx, cy, particleColor, isMajor ? 18 : 12);

  // 3D 圆弧翻转
  slot.classList.remove('pulse-glow', 'idle', 'entering');
  slot.style.pointerEvents = 'none';
  // 强制回流：清除所有动画残留的 transform，确保从 0° 开始旋转
  void slot.offsetHeight;
  slot.classList.add('flipping');
  slot.style.transform = 'rotateY(-180deg)';

  // 200ms（过半）切换正反面
  setTimeout(() => {
    back.style.display = 'none';
    front.style.display = 'block';
  }, 200);

  // 400ms 动画完成
  setTimeout(() => {
    slot.classList.remove('flipping');
    slot.style.transform = '';
    slot.classList.add('flipped');
    if (isMajor) slot.classList.add('major-flipped');
    slot.style.pointerEvents = '';

    if (document.querySelectorAll('.card-slot.flipped').length === drawnCards.length) {
      setTimeout(() => showReading(), 250);
    }
  }, 400);
}

// ===== 生成解读 =====
function generateReading(cards, reversedMap, count) {
  const spread = SPREADS[count];
  let html = `<h3>🔮 ${spread.name} · 占卜解读</h3><div class="reading-text">`;

  cards.forEach((card, i) => {
    const isRev = reversedMap[i];
    const pos = spread.positions[i];
    const kw = isRev ? card.keywordR : card.keywordU;
    const cardType = card.suit === 'major' ? '大阿卡纳' : `${card.suitName || ''} ${card.rank || ''}`;
    const revClass = isRev ? ' reversed-item' : '';

    const dd = CARD_DEEP_DATA[card.num];
    const mythicText = dd && dd.mythic ? dd.mythic.slice(0, 120) + (dd.mythic.length > 120 ? '…' : '') : '';
    const archText = dd && dd.archetype ? dd.archetype : '';

    const flipId = 'rf_' + card.num + '_' + i;
    html += `<div class="reading-flip" onclick="this.classList.toggle('flipped')">
      <div class="rf-inner">
        <div class="rf-front">
          <div class="rf-pos">${pos.symbol} ${pos.name}</div>
          <div class="rf-name">${card.symbol} ${card.name}</div>
          <div class="rf-sub">${card.nameEn}${archText ? ' · ' + archText : ''}</div>
          <div class="rf-hint">▼ 点击翻开</div>
        </div>
        <div class="rf-back">
          <div class="reading-pos">${pos.symbol} ${pos.name} · <span class="reversed-tag">${isRev ? '▼ 逆位' : '▲ 正位'}</span></div>
          <div class="reading-card-name">${card.symbol} ${card.name} <span style="font-size:0.65rem;color:rgba(192,132,252,0.4);">${card.nameEn}</span></div>
          <div class="reading-meaning" style="margin-top:0.5rem;">${isRev ? card.meaningR : card.meaningU}</div>
          ${card.vision ? `<div class="reading-vision" style="font-size:0.75rem;color:rgba(192,132,252,0.5);margin-top:0.3rem;font-style:italic;">🖼️ ${card.vision}</div>` : ''}
          <div class="reading-keywords">🔑 ${kw} · ${cardType}</div>
          ${mythicText ? `<div style="font-size:0.7rem;color:rgba(192,132,252,0.35);margin-top:0.3rem;padding-top:0.3rem;border-top:1px solid rgba(192,132,252,0.08);">📖 传统故事：${mythicText}</div>` : ''}
          ${renderExtraCardInfo(card)}
        </div>
      </div>
    </div>`;
  });

  html += `<div class="reading-flip" onclick="this.classList.toggle('flipped')" style="margin-top:1.2rem;">
    <div class="rf-inner">
      <div class="rf-front">
        <div class="rf-name">✦ 综合指引</div>
        <div class="rf-hint">▼ 点击翻开</div>
      </div>
      <div class="rf-back">
        <div class="summary-text">` + generateSummary(cards, reversedMap, count) + `</div>
      </div>
    </div>
  </div>`;
  return html;
}

// ===== 卡牌深度信息（来自 RWS 参考数据）=====
function renderExtraCardInfo(card) {
  const dd = CARD_DEEP_DATA[card.num];
  if (!dd) return '';
  const parts = [];
  if (dd.archetype) parts.push(`🧿 ${dd.archetype}`);
  if (dd.element) parts.push(`🌱 ${dd.element}`);
  if (dd.numerology) parts.push(`🔢 ${dd.numerology}`);
  if (dd.hebrew) parts.push(`📜 ${dd.hebrew}`);
  if (parts.length === 0) return '';
  return `<div style="font-size:0.7rem;color:rgba(192,132,252,0.4);margin-top:0.3rem;display:flex;gap:0.5rem;flex-wrap:wrap;">${parts.join(' · ')}</div>`;
}

// ===== 综合解读总结 =====
function generateSummary(cards, reversedMap, count) {
  const revCount = Object.values(reversedMap).filter(Boolean).length;
  const majorCount = cards.filter(c => c.suit === 'major').length;
  const spread = SPREADS[count];

  let adviceItems = [];
  cards.forEach((card, i) => {
    const isRev = reversedMap[i];
    const pos = spread?.positions?.[i];
    const kw = (isRev ? card.keywordR : card.keywordU) || '';
    const keywords = kw.split('·').map(s => s.trim()).filter(Boolean);
    if (keywords.length > 0 && pos) {
      adviceItems.push({ pos: pos.name, keywords: keywords, card: card.name, rev: isRev });
    }
  });

  let summary = '';

  if (count === 1) {
    const card = cards[0];
    const isRev = reversedMap[0];
    const kw = (isRev ? card.keywordR : card.keywordU) || '';
    summary = isRev
      ? `今天的你可能会遇到「${card.name}」的逆位能量——${kw}。建议：${card.meaningR} 今天在相关事项上多加留意，放慢节奏。`
      : `「${card.name}」正位在为你指引方向——${kw}。建议：${card.meaningU} 今天适合抓住这股能量，顺势而为。`;
  } else {
    const parts = [];

    if (revCount > count / 2) {
      parts.push('🔶 逆位牌较多，说明当前很多事情可能不太顺，别硬扛——适时调整方案比硬撑更明智。');
    } else if (revCount === 0) {
      parts.push('✅ 全部正位，能量正向流动——是个好时机去推进你在意的事情。');
    } else {
      parts.push('⚖️ 正逆位平衡——事情有好有坏，接纳就好，不需要追求事事完美。');
    }

    if (majorCount >= 2) {
      parts.push(`🌟 抽到了 ${majorCount} 张大阿卡纳——近期可能有重要的转折点或人生课题出现，值得认真对待。`);
    }

    const actionTips = adviceItems.map(item => {
      const icon = item.rev ? '⚠️' : '✅';
      return `${icon}【${item.pos}】${item.card}：关注「${item.keywords.slice(0, 2).join('/')}」`;
    });
    if (actionTips.length > 0) {
      parts.push('📍 各位置实操要点：');
      parts.push(actionTips.join('<br>'));
    }

    const revCards = cards.filter((_, i) => reversedMap[i]);
    if (revCards.length === 1) {
      parts.push(`💡 特别关注「${revCards[0].name}」逆位所代表的领域——它很可能就是当前需要调整的关键所在。`);
    }

    parts.push('✨ 抽牌不是算命，是帮你换个角度看问题。带着这些提示去生活，牌上的能量就会慢慢落地。');
    summary = parts.join(' ');
  }
  return summary;
}

// ===== 抽牌主逻辑 =====
function drawCards(count) {
  currentCount = count;

  const card = document.getElementById('readingCard');
  const action = document.getElementById('actionArea');
  if (card) {
    card.classList.remove('visible', 'open');
  }
  action.classList.remove('visible');
  isAnimating = false;

  const shuffled = shuffle(ALL_CARDS);
  drawnCards = shuffled.slice(0, count);

  drawnReversed = {};
  for (let i = 0; i < count; i++) {
    drawnReversed[i] = Math.random() < 0.5;
  }

  renderSlots(count);
}

   400,402,403,404,405,406,407,408,409,410,411,412,413,414
  ].forEach(n => allImages.push('card_images/' + n + '.webp'));
  // 低优先级预取（requestIdleCallback 或 setTimeout 延迟）
  // 同时加载 WebP（主用）和 PNG（备胎）
  const urls2 = allImages.map(u => u.replace('.webp', '.png'));
  const allUrls = [...allImages, ...urls2];
  const fn = window.requestIdleCallback || function(cb) { setTimeout(cb, 300); };
  fn(() => {
    let i = 0;
    function loadNext() {
      if (i >= allUrls.length) return;
      const img = new Image();
      img.fetchPriority = 'low';
      img.onload = img.onerror = () => { i++; setTimeout(loadNext, 20); };
      img.src = allUrls[i];
    }
  });
})();
